{% extends "base.html" %}

{% block content %}
<h2>Doctor Management</h2>
<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addDoctorModal">Add Doctor</button>

<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Specialization</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Qualification</th>
                <th>Experience (Years)</th>
                <th>Fee ($)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="doctorsTable">
        </tbody>
    </table>
</div>

<!-- Add Doctor Modal -->
<div class="modal fade" id="addDoctorModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Doctor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addDoctorForm">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label>Specialization</label>
                        <input type="text" class="form-control" id="specialization" required>
                    </div>
                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" class="form-control" id="phone" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label>Qualification</label>
                        <input type="text" class="form-control" id="qualification" required>
                    </div>
                    <div class="mb-3">
                        <label>Experience Years</label>
                        <input type="number" class="form-control" id="experience_years" required>
                    </div>
                    <div class="mb-3">
                        <label>Consultation Fee ($)</label>
                        <input type="number" step="0.01" class="form-control" id="fee" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="addDoctor()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Doctor Modal -->
<div class="modal fade" id="editDoctorModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Doctor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editDoctorForm">
                    <input type="hidden" id="edit_id">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" id="edit_name" required>
                    </div>
                    <div class="mb-3">
                        <label>Specialization</label>
                        <input type="text" class="form-control" id="edit_specialization" required>
                    </div>
                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" class="form-control" id="edit_phone" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" id="edit_email" required>
                    </div>
                    <div class="mb-3">
                        <label>Qualification</label>
                        <input type="text" class="form-control" id="edit_qualification" required>
                    </div>
                    <div class="mb-3">
                        <label>Experience Years</label>
                        <input type="number" class="form-control" id="edit_experience_years" required>
                    </div>
                    <div class="mb-3">
                        <label>Consultation Fee ($)</label>
                        <input type="number" step="0.01" class="form-control" id="edit_fee" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="updateDoctor()">Update</button>
            </div>
        </div>
    </div>
</div>

<script>
    function loadDoctors() {
        axios.get('/api/doctors')
            .then(response => {
                const doctors = response.data;
                const tableBody = document.getElementById('doctorsTable');
                tableBody.innerHTML = '';
                doctors.forEach(doctor => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${doctor.id}</td>
                            <td>${doctor.name}</td>
                            <td>${doctor.specialization}</td>
                            <td>${doctor.phone}</td>
                            <td>${doctor.email}</td>
                            <td>${doctor.qualification}</td>
                            <td>${doctor.experience_years}</td>
                            <td>$${doctor.fee}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="editDoctor(${doctor.id})">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteDoctor(${doctor.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(error => {
                console.error('Error loading doctors:', error);
                alert('Error loading doctors');
            });
    }
    
    function addDoctor() {
        const data = {
            name: document.getElementById('name').value,
            specialization: document.getElementById('specialization').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            qualification: document.getElementById('qualification').value,
            experience_years: document.getElementById('experience_years').value,
            fee: document.getElementById('fee').value
        };
        
        axios.post('/api/doctors', data)
            .then(() => {
                location.reload();
            })
            .catch(error => {
                console.error('Error adding doctor:', error);
                alert('Error adding doctor');
            });
    }
    
    function editDoctor(id) {
        axios.get(`/api/doctors/${id}`)
            .then(response => {
                const doctor = response.data;
                document.getElementById('edit_id').value = doctor.id;
                document.getElementById('edit_name').value = doctor.name;
                document.getElementById('edit_specialization').value = doctor.specialization;
                document.getElementById('edit_phone').value = doctor.phone;
                document.getElementById('edit_email').value = doctor.email;
                document.getElementById('edit_qualification').value = doctor.qualification;
                document.getElementById('edit_experience_years').value = doctor.experience_years;
                document.getElementById('edit_fee').value = doctor.fee;
                new bootstrap.Modal(document.getElementById('editDoctorModal')).show();
            })
            .catch(error => {
                console.error('Error loading doctor:', error);
                alert('Error loading doctor details');
            });
    }
    
    function updateDoctor() {
        const id = document.getElementById('edit_id').value;
        const data = {
            name: document.getElementById('edit_name').value,
            specialization: document.getElementById('edit_specialization').value,
            phone: document.getElementById('edit_phone').value,
            email: document.getElementById('edit_email').value,
            qualification: document.getElementById('edit_qualification').value,
            experience_years: document.getElementById('edit_experience_years').value,
            fee: document.getElementById('edit_fee').value
        };
        
        axios.put(`/api/doctors/${id}`, data)
            .then(() => {
                location.reload();
            })
            .catch(error => {
                console.error('Error updating doctor:', error);
                alert('Error updating doctor');
            });
    }
    
    function deleteDoctor(id) {
        if(confirm('Are you sure you want to delete this doctor?')) {
            axios.delete(`/api/doctors/${id}`)
                .then(() => {
                    loadDoctors();
                })
                .catch(error => {
                    console.error('Error deleting doctor:', error);
                    alert('Error deleting doctor');
                });
        }
    }
    
    // Add search by specialization
    function searchBySpecialization() {
        const specialization = document.getElementById('searchSpecialization').value;
        if(specialization) {
            axios.get(`/api/doctors/specialization/${specialization}`)
                .then(response => {
                    const doctors = response.data;
                    const tableBody = document.getElementById('doctorsTable');
                    tableBody.innerHTML = '';
                    doctors.forEach(doctor => {
                        tableBody.innerHTML += `
                            <tr>
                                <td>${doctor.id}</td>
                                <td>${doctor.name}</td>
                                <td>${doctor.specialization}</td>
                                <td>${doctor.phone}</td>
                                <td>${doctor.email}</td>
                                <td>${doctor.qualification}</td>
                                <td>${doctor.experience_years}</td>
                                <td>$${doctor.fee}</td>
                                <td>
                                    <button class="btn btn-sm btn-warning" onclick="editDoctor(${doctor.id})">Edit</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteDoctor(${doctor.id})">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                });
        } else {
            loadDoctors();
        }
    }
    
    loadDoctors();
</script>

<div class="mt-3">
    <div class="input-group mb-3">
        <input type="text" class="form-control" id="searchSpecialization" placeholder="Search by specialization">
        <button class="btn btn-outline-secondary" onclick="searchBySpecialization()">Search</button>
        <button class="btn btn-outline-primary" onclick="loadDoctors()">Show All</button>
    </div>
</div>
{% endblock %}
